<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCPI to LLM</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app app-info">
      <section class="sap-shell">
        <div class="sap-accent" aria-hidden="true"></div>
        <p class="sap-kicker">SAP Cloud Integration</p>
        <h1>SCPI to LLM</h1>
        <p class="sap-copy">
          This extension works directly inside the SAP artifact page and exports a single LLM-ready `.txt` file.
        </p>
      </section>

      <section class="panel info-card">
        <div class="panel-head">
          <h3>How to use it</h3>
        </div>
        <p class="muted">
          Open a content package in SAP Integration Suite, go to an Integration Flow row, open <strong>Actions</strong>, and click <strong>To LLM</strong>.
        </p>
      </section>
    </main>
  </body>
</html>
